<div class="flexcol {{cssClass}}" autocomplete="off">

    {{!-- Sheet Header --}}
    <header class="sheet-header">
        <img src="{{img}}" data-action="editImage" data-field="img" alt="Portrait">
        <div class="header-fields">
            <div class="charname">
                <input class="nameInput" name="name" type="text" value="{{source.name}}" placeholder="Name" />
                <input class="charAtrributeInput" name="system.species.main" value="{{system.species.main}}" type="text" placeholder="Species"/>
                <input class="charAtrributeInput" name="system.height.main" value="{{system.height.main}}" type="text" placeholder="Height"/>
                
                <div class="resource">
                    <span class="resourceSpan">HP: </span>
                    <input class="valueInput" type="number" name="system.health.value" value="{{system.health.value}}"/>
                    <span class="resourceSpan"> / </span>
                    <input class="valueInput" type="number" name="system.health.max" value="{{system.health.max}}"/>
                </div>
                <div class="resource">
                    <span class="resourceSpan">EP: </span>
                    <input class="valueInput" type="number" name="system.power.value" value="{{system.power.value}}"/>
                    <span class="resourceSpan"> / </span>
                    <input class="valueInput" type="number" name="system.power.max" value="{{system.power.max}}"/>

                </div>
                <div class="actor-button-layout">
                    <a class="roll-control" title="{{ localize "SIMPLE.ActorSettings" }}" data-action="rollControl"><i class="fas fa-dice-d6"></i></a>
                    <a class="settings-control" title="{{ localize "SIMPLE.ActorSettings" }}" data-action="settingsControl"><i class="fas fa-cog"></i></a>
                </div>
            </div>
        </div>
    </header>
</div>
