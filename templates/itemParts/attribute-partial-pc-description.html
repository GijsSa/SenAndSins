
<section class="tab {{tab.cssClass}}"
         data-group="attribute" 
         data-tab="attributeDescription">
        {{#if editable}}
        <prose-mirror
            name="system.description"
            button="true"
            editable="{{editable}}"
            toggled="false"
            value="{{system.description}}">
            {{{enrichedDescription}}}
        </prose-mirror>
        {{else}}
            {{{enrichedDescription}}}
        {{/if}}
</section>
